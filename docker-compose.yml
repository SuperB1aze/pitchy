services:
  postgres:
    image: postgres:16-alpine
    container_name: pitchy-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_MIGRATION_USER}
      POSTGRES_PASSWORD: ${DB_MIGRATION_PASS}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pitchy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_MIGRATION_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pitchy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - pitchy_minio_data:/data

volumes:
  pitchy_postgres_data:
  pitchy_minio_data:
